services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactions"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
    command: ["/app/api"]
    environment:
      APP_ENV: docker
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/transactions?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      QUEUE_NAME: transaction_jobs
      LARGE_TRANSFER_THRESHOLD: 5000
      MIGRATIONS_DIR: /app/migrations
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
    command: ["/app/worker"]
    environment:
      APP_ENV: docker
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/transactions?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      QUEUE_NAME: transaction_jobs
      LARGE_TRANSFER_THRESHOLD: 5000
      WORKER_RETRY_LIMIT: 3
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
